<!DOCTYPE html>
<html>
<head>
    <title>Three.js Fixes Test</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        .pass { color: green; }
        .fail { color: red; }
    </style>
</head>
<body>
    <h1>Three.js Deprecation Fixes Test</h1>
    <div id="results"></div>
    
    <script type="module">
        import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.185.0/build/three.module.js';
        
        const results = document.getElementById('results');
        
        function addResult(message, isSuccess) {
            const div = document.createElement('div');
            div.className = isSuccess ? 'pass' : 'fail';
            div.textContent = message;
            results.appendChild(div);
        }
        
        // Test 1: THREE.Timer instead of THREE.Clock
        try {
            const timer = new THREE.Timer();
            const delta = timer.getDelta();
            const elapsed = timer.getElapsed();
            addResult('✓ THREE.Timer works: delta=' + delta.toFixed(4) + ', elapsed=' + elapsed.toFixed(4), true);
        } catch (error) {
            addResult('✗ THREE.Timer failed: ' + error.message, false);
        }
        
        // Test 2: PCFShadowMap instead of PCFSoftShadowMap
        try {
            const renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.shadowMap.enabled = true;
            renderer.shadowMap.type = THREE.PCFShadowMap;
            addResult('✓ PCFShadowMap works: ' + renderer.shadowMap.type, true);
            renderer.dispose();
        } catch (error) {
            addResult('✗ PCFShadowMap failed: ' + error.message, false);
        }
        
        // Test 3: Instanceof checks with null safety
        try {
            const scene = new THREE.Scene();
            const mesh = new THREE.Mesh();
            
            // Test with valid object
            if (mesh && mesh instanceof THREE.Mesh) {
                addResult('✓ Instanceof check with valid object works', true);
            }
            
            // Test with null/undefined
            const nullObj = null;
            if (nullObj && nullObj instanceof THREE.Mesh) {
                addResult('This shouldn\'t print', false);
            } else {
                addResult('✓ Instanceof check with null is safe', true);
            }
            
            scene.remove(mesh);
        } catch (error) {
            addResult('✗ Instanceof checks failed: ' + error.message, false);
        }
        
        addResult('All tests completed!', true);
    </script>
</body>
</html>
